locale: "en-US"
title: "KateiRens Geek Notes"
title_separator: "-"
name: "KateiRens Geek Notes"
description: "Just a little playground for me...."
url: ""
baseurl: ""
repository: "KateiRen/KateiRen.github.io"
remote_theme: "mmistakes/minimal-mistakes"
minimal_mistakes_skin: "dirt"
search: true

logo: "/assets/images/logo.png"

include:
  - _pages

permalink: /:title/

plugins:
  - jekyll-remote-theme
  - jekyll-include-cache
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-seo-tag

paginate: 6
paginate_path: /page:num/

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: true

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: false
      share: true
      related: true
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: false

exclude:
  - changelog.md
  - LICENSE.txt
  - README.md
  - Gemfile
  - Gemfile.lock
